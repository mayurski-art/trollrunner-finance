<script>
  const TROLL_WALLET = "79vVRZ7qnZfj9xCto5d9Kwf4eAimqMDrQysZjHBbFbsA";
  const TROLL_MINT = "5UUH9RTDiSpq6HKS6bp4NdU9PNJpXRXuiw6ShBTBhgH2";

  function fmtNumber(value) {
    return Number(value || 0).toLocaleString(undefined, {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });
  }

  async function getPrices() {
    try {
      const res = await fetch(
        `https://api.dexscreener.com/latest/dex/tokens/${TROLL_MINT}`
      );

      if (!res.ok) throw new Error("Dexscreener fetch failed");

      const json = await res.json();

      // 🔥 SAFE ACCESS
      if (!json.pairs || json.pairs.length === 0) {
        console.warn("No liquidity pool found for TROLL");
        return { trollUsd: 0 };
      }

      const trollUsd = Number(json.pairs[0].priceUsd || 0);

    <section class="hero">
      <h1>Treasury Console</h1>
      <p class="sub" id="market-line">Loading market data...</p>

      <div class="stats">
        <article class="stat">
          <div class="label">$TROLL Balance</div>
          <div id="troll-balance" class="value">Loading...</div>
        </article>
        <article class="stat">
          <div class="label">USD Value</div>
          <div id="troll-usd" class="value">Loading...</div>
        </article>
        <article class="stat">
          <div class="label">System Status</div>
          <div class="value">Trolling</div>
        </article>
      </div>

            <section class="donation" aria-label="Troll Fund wallet">
        <h2>Troll Fund Wallet</h2>
        <div class="wallet">79vVRZ7qnZfj9xCto5d9Kwf4eAimqMDrQysZjHBbFbsA</div>
      </section>

      <div class="grid">
        <article class="card"><h3>Budget Dashboard</h3><p>Track monthly spend categories and compare against planned budgets.</p></article>
        <article class="card"><h3>Campaign Costs</h3><p>Summarize route, print, and logistics costs for each sticker mission.</p></article>
        <article class="card"><h3>Growth Planning</h3><p>Lay out future spend targets for scaling to new cities and drops.</p></article>
      </div>
    </section>
  </div>
  <script>
    const TROLL_WALLET = "79vVRZ7qnZfj9xCto5d9Kwf4eAimqMDrQysZjHBbFbsA";
    const TROLL_MINT = "5UUH9RTDiSpq6HKS6bp4NdU9PNJpXRXuiw6ShBTBhgH2";

      const trollToken = (tokens || []).find((token) => {
        const symbol = (token?.tokenSymbol || token?.symbol || "").toUpperCase();
        return symbol.includes("TROLL");
      });
    }

    async function getPricesFromDexScreener() {
      const trollRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${TROLL_MINT}`);
      if (!trollRes.ok) throw new Error(`DexScreener API error (${trollRes.status})`);
      const trollJson = await trollRes.json();
      const trollPair = (trollJson?.pairs || []).find((pair) => pair?.chainId === "solana");
      const trollUsd = Number(trollPair?.priceUsd || 0);
      const priceNative = Number(trollPair?.priceNative || 0);
      const solUsd = priceNative > 0 ? trollUsd / priceNative : 0;

      if (!trollUsd || !solUsd) throw new Error("DexScreener missing price data");
      return { trollUsd, solUsd, source: "DexScreener" };
    }

    async function getPricesFromCoinGecko() {
      const [solRes, trollRes] = await Promise.all([
        fetch("https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd"),
        fetch(`https://api.coingecko.com/api/v3/simple/token_price/solana?contract_addresses=${TROLL_MINT}&vs_currencies=usd`),
      ]);
      if (!solRes.ok || !trollRes.ok) {
        throw new Error(`CoinGecko API error (${solRes.status}/${trollRes.status})`);
      }
      const [solJson, trollJson] = await Promise.all([solRes.json(), trollRes.json()]);
      const solUsd = Number(solJson?.solana?.usd || 0);
      const trollUsd = Number(trollJson?.[TROLL_MINT.toLowerCase()]?.usd || 0);
      if (!trollUsd || !solUsd) throw new Error("CoinGecko missing price data");
      return { trollUsd, solUsd, source: "CoinGecko" };
    }

    async function getPrices() {
      try {
        return await getPricesFromDexScreener();
      } catch (dexErr) {
        console.warn("DexScreener pricing failed, falling back to CoinGecko", dexErr);
        try {
          return await getPricesFromCoinGecko();
        } catch (cgErr) {
          console.warn("CoinGecko pricing also failed", cgErr);
          return { trollUsd: 0, solUsd: 0, source: "Unavailable" };
        }
      }
    }

    async function getTrollBalance() {
      const res = await fetch("https://api.mainnet-beta.solana.com", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          jsonrpc: "2.0",
          id: 1,
          method: "getTokenAccountsByOwner",
          params: [
            TROLL_WALLET,
            { mint: TROLL_MINT },
            { encoding: "jsonParsed" }
          ]
        }),
      });
      if (!res.ok) throw new Error(`Solana RPC returned ${res.status}`);
      const json = await res.json();
      const accounts = json?.result?.value || [];
      return accounts.reduce((sum, account) => {
        const amount = Number(account?.account?.data?.parsed?.info?.tokenAmount?.uiAmount || 0);
        return sum + amount;
      }, 0);
    }

    async function loadTrollStats() {
      const balanceEl = document.getElementById("troll-balance");
      const usdEl = document.getElementById("troll-usd");
      const marketLineEl = document.getElementById("market-line");

      try {
        const [{ trollUsd, solUsd, source }, amount] = await Promise.all([
          getPrices(),
          getTrollBalance(),
        ]);
        const usdValue = amount * trollUsd;

        balanceEl.textContent = `${fmtNumber(amount)} TROLL`;
        usdEl.textContent = `$${fmtNumber(usdValue)}`;
        marketLineEl.textContent = `${source} realtime: $TROLL $${fmtNumber(trollUsd)} | $SOL $${fmtNumber(solUsd)}`;
      } catch (err) {
        balanceEl.textContent = "Unavailable";
        usdEl.textContent = "Unavailable";
        if (marketLineEl) marketLineEl.textContent = "Market data unavailable.";
        console.error("Unable to load $TROLL stats", err);
      }
    } catch (err) {
      console.error("Load error:", err);

      balanceEl.textContent = "0";
      usdEl.textContent = "$0";
      marketLineEl.textContent = "System online (data unavailable)";
    }
  }

  loadTrollStats();
  setInterval(loadTrollStats, 10000);
</script>
