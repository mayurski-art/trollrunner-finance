<html lang="en">
<head>
<meta charset="UTF-8">

<style>
:root {
  --bg: #050806;
  --panel: #0b140d;
  --panel-soft: #101c13;
  --line: rgba(126, 255, 142, 0.3);
  --text: #d8ffe0;
  --muted: #86bf93;
  --accent: #7eff8e;
  --accent-soft: rgba(126, 255, 142, 0.15);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  color: var(--text);
  background:
    radial-gradient(circle at 20% 10%, rgba(126, 255, 142, 0.12), transparent 40%),
    radial-gradient(circle at 80% 0%, rgba(94, 176, 255, 0.08), transparent 35%),
    linear-gradient(180deg, #070b08, #030503 55%);
}

.scanlines::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    rgba(126, 255, 142, 0.025) 0px,
    rgba(126, 255, 142, 0.025) 1px,
    transparent 1px,
    transparent 3px
  );
}

.wrap {
  max-width: 1040px;
  margin: 0 auto;
  padding: 26px 18px 56px;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(126, 255, 142, 0.06), rgba(126, 255, 142, 0.02));
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4) inset;
}

.brand { letter-spacing: 0.04em; font-weight: 700; }

.pills { display: flex; gap: 8px; flex-wrap: wrap; }
.pill {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  color: var(--text);
  text-decoration: none;
  font-size: 12px;
  background: var(--panel-soft);
}
.pill:hover { background: var(--accent-soft); }

.hero {
  margin-top: 20px;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 22px;
  background: linear-gradient(180deg, rgba(18, 29, 21, 0.8), rgba(7, 11, 8, 0.9));
}

h1 {
  margin: 0 0 6px;
  font-size: 32px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.sub {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-top: 16px;
}

.stat {
  padding: 14px;
  border-radius: 10px;
  background: var(--panel);
  border: 1px solid var(--line);
}

.label {
  color: var(--muted);
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.07em;
}
.value {
  margin-top: 8px;
  font-size: 26px;
  color: var(--accent);
  text-shadow: 0 0 12px rgba(126, 255, 142, 0.5);
}

.terminal {
  margin-top: 14px;
  padding: 14px;
  border-radius: 10px;
  background: #030603;
  border: 1px solid var(--line);
  font-size: 13px;
  color: var(--muted);
  white-space: pre-wrap;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-top: 14px;
}

.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px;
}

.card h3 {
  margin: 0 0 8px;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.card p { margin: 0; color: var(--muted); line-height: 1.5; font-size: 14px; }

.transfers-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.transfers-header h3 {
  margin: 0;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.transfers-note {
  color: var(--muted);
  font-size: 12px;
}

.transfer-list {
  display: grid;
  gap: 10px;
}

.transfer-item {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  background: #08100a;
}

.transfer-meta {
  margin-top: 8px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.transfer-direction {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.transfer-in { color: #8cff9a; }
.transfer-out { color: #ffb38a; }

.transfer-title {
  margin-top: 4px;
  font-size: 14px;
}

.transfer-amount {
  margin-top: 8px;
  color: var(--text);
  font-size: 13px;
}

.transfer-item a {
  color: var(--accent);
  text-decoration: none;
}

.transfer-item a:hover {
  text-decoration: underline;
}

.donation {
  margin-top: 14px;
  padding: 14px;
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(126, 255, 142, 0.08), rgba(126, 255, 142, 0.03));
  border: 1px solid var(--line);
}

.donation h2 {
  margin: 0 0 8px;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.donation p {
  margin: 0;
  color: var(--muted);
  line-height: 1.55;
  font-size: 14px;
}

.wallet {
  margin-top: 10px;
  padding: 12px;
  border-radius: 8px;
  background: #030603;
  border: 1px dashed var(--line);
  color: var(--text);
  font-size: 13px;
  overflow-wrap: anywhere;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.wallet-value {
  min-width: 0;
  overflow-wrap: anywhere;
}

.copy-btn {
  flex: 0 0 auto;
  border: 1px solid rgba(216, 255, 224, 0.25);
  background: rgba(11, 20, 13, 0.75);
  width: 34px;
  height: 30px;
  border-radius: 7px;
  color: #9db2a2;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.copy-icon {
  position: relative;
  width: 16px;
  height: 16px;
}

.copy-square {
  position: absolute;
  width: 9px;
  height: 9px;
  border: 1px solid currentColor;
  border-radius: 2px;
  background: rgba(157, 178, 162, 0.18);
}

.copy-square.back {
  top: 2px;
  left: 5px;
}

.copy-square.front {
  top: 5px;
  left: 2px;
}

.copy-btn:hover {
  background: rgba(126, 255, 142, 0.12);
  color: #ced9d1;
}

.copy-btn:active {
  transform: translateY(1px);
}

.copy-btn.copied {
  color: var(--accent);
  border-color: var(--line);
}

@media (max-width: 860px) {
  .stats, .grid { grid-template-columns: 1fr; }
  h1 { font-size: 28px; }
}
</style>
</head>
<body class="scanlines">
  <div class="wrap">
    <div class="top">
      <strong class="brand">💰 TROLLRUNNER.FINANCE</strong>
      <nav class="pills" aria-label="Section links">
        <a class="pill" href="https://blog.trollrunner.net">Blog</a>
        <a class="pill" href="https://nutrition.trollrunner.net">Nutrition</a>
        <a class="pill" href="https://trollrunner.net">Main Site</a>
      </nav>
    </div>

    <section class="hero">
      <h1>Treasury Console</h1>
      <p class="sub" id="market-line">Loading market data...</p>

      <div class="stats">
        <article class="stat">
          <div class="label">$TROLL Balance</div>
          <div id="troll-balance" class="value">Loading...</div>
        </article>
        <article class="stat">
          <div class="label">USD Value</div>
          <div id="troll-usd" class="value">Loading...</div>
        </article>
        <article class="stat">
          <div class="label">System Status</div>
          <div class="value">Trolling</div>
        </article>
      </div>

            <section class="donation" aria-label="Troll Fund wallet">
        <h2>Troll Fund Wallet</h2>
        <div class="wallet">
          <span id="wallet-address" class="wallet-value">79vVRZ7qnZfj9xCto5d9Kwf4eAimqMDrQysZjHBbFbsA</span>
          <button id="copy-wallet-btn" class="copy-btn" type="button" aria-label="Copy Troll Fund wallet address" title="Copy wallet address">
            <span class="copy-icon" aria-hidden="true">
              <span class="copy-square back"></span>
              <span class="copy-square front"></span>
            </span>
          </button>
        </div>
        <p style="margin-top:10px; color: var(--muted); font-size: 13px;">
          Conversion rate: $6.90 = 1 mile ran = 1 sticker</p>
      </section>
  </div>
  <script>
    const TROLL_WALLET = "79vVRZ7qnZfj9xCto5d9Kwf4eAimqMDrQysZjHBbFbsA";
    const TROLL_MINT = "5UUH9RTDiSpq6HKS6bp4NdU9PNJpXRXuiw6ShBTBhgH2";
    const SOLANA_RPC_ENDPOINTS = [
      "https://solana-rpc.publicnode.com",
      "https://api.mainnet-beta.solana.com",
      "https://rpc.ankr.com/solana",
    ];
    const MAX_TRANSFER_ITEMS = 12;
    const MAX_SIGNATURE_SCAN = 250;
    const BALANCE_CACHE_KEY = "troll_stats_cache_v1";
    const CACHE_TTL_MS = 2 * 60 * 1000;
    let latestTrollUsd = null;
    let cachedTransfers = [];

    function fmtTokenAmount(value) {
      return Number(value || 0).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });
    }

    function fmtUsd(value) {
      return Number(value || 0).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });
    }

    function fmtPrice(value) {
      const numeric = Number(value || 0);
      const fractionDigits = numeric > 0 && numeric < 0.01 ? 8 : 4;
      return numeric.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: fractionDigits,
      });
    }

    async function getTrollPrice() {
      const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=troll-2&vs_currencies=usd");
      if (!res.ok) throw new Error(`CoinGecko API error (${res.status})`);
      const json = await res.json();
      const trollUsd = Number(json?.["troll-2"]?.usd || 0);
      if (!trollUsd) throw new Error("CoinGecko missing troll-2 USD price");
      return { trollUsd, source: "CoinGecko" };
    }

    async function rpcRequest(method, params) {
      let lastError;
      for (const endpoint of SOLANA_RPC_ENDPOINTS) {
        try {
          const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              jsonrpc: "2.0",
              id: 1,
              method,
              params
            }),
          });
          if (!res.ok) throw new Error(`${endpoint} returned ${res.status}`);
          const json = await res.json();
          if (json?.error) throw new Error(`${endpoint} RPC error: ${json.error.message || "unknown"}`);
          return json.result;
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error(`Unable to run RPC method ${method}`);
    }

    async function getTrollBalanceFromEndpoint(endpoint) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 3500);
      let res;
      try {
        res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: controller.signal,
          body: JSON.stringify({
            jsonrpc: "2.0",
            id: 1,
            method: "getTokenAccountsByOwner",
            params: [
              TROLL_WALLET,
              { mint: TROLL_MINT },
              { encoding: "jsonParsed" }
            ]
          }),
        });
      } finally {
        clearTimeout(timeoutId);
      }
      if (!res.ok) throw new Error(`${endpoint} returned ${res.status}`);
      const json = await res.json();
      if (json?.error) throw new Error(`${endpoint} RPC error: ${json.error.message || "unknown"}`);
      const accounts = json?.result?.value || [];
      const amount = accounts.reduce((sum, account) => {
        const tokenAmount = Number(account?.account?.data?.parsed?.info?.tokenAmount?.uiAmount || 0);
        return sum + tokenAmount;
      }, 0);
      return { amount, endpoint };
    }

    async function getTrollBalance() {
      try {
        return await Promise.any(
          SOLANA_RPC_ENDPOINTS.map((endpoint) =>
            getTrollBalanceFromEndpoint(endpoint).catch((err) => {
              console.warn(`Balance fetch failed on ${endpoint}`, err);
              throw err;
            })
          )
        );
      } catch (err) {
        throw new Error("Unable to fetch balance from any Solana RPC endpoint");
      }
    }

    function readStatsCache() {
      try {
        const raw = localStorage.getItem(BALANCE_CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || Date.now() - Number(parsed.timestamp || 0) > CACHE_TTL_MS) return null;
        return parsed;
      } catch (err) {
        return null;
      }
    }

    function writeStatsCache(payload) {
      try {
        localStorage.setItem(BALANCE_CACHE_KEY, JSON.stringify({
          ...payload,
          timestamp: Date.now(),
        }));
      } catch (err) {
        // ignore storage failures
      }
    }

    function applyCachedStats() {
      const cached = readStatsCache();
      if (!cached) return false;
      const balanceEl = document.getElementById("troll-balance");
      const usdEl = document.getElementById("troll-usd");
      const marketLineEl = document.getElementById("market-line");
      balanceEl.textContent = `${fmtTokenAmount(cached.balance)} TROLL`;
      usdEl.textContent = `$${fmtUsd(cached.usdValue)}`;
      marketLineEl.textContent = `Showing cached values while refreshing live market data...`;
      latestTrollUsd = Number(cached.price || 0) || null;
      return true;
    }

    function shortenAddress(value) {
      if (!value) return "Unknown";
      return `${value.slice(0, 4)}...${value.slice(-4)}`;
    }

    async function resolveSolName(address) {
      if (!address) return null;
      try {
        const res = await fetch(`https://sns-sdk-proxy.bonfida.workers.dev/reverse/${address}`);
        if (!res.ok) return null;
        const json = await res.json();
        if (!json?.result) return null;
        return json.result.endsWith(".sol") ? json.result : `${json.result}.sol`;
      } catch (err) {
        return null;
      }
    }

    function findTokenDelta(meta, ownerAddress) {
      const entries = [];
      for (const item of meta?.preTokenBalances || []) entries.push({ ...item, phase: "pre" });
      for (const item of meta?.postTokenBalances || []) entries.push({ ...item, phase: "post" });
      const byAccount = new Map();
      for (const item of entries) {
        if (item?.mint !== TROLL_MINT) continue;
        if (item?.owner !== ownerAddress) continue;
        const key = String(item.accountIndex);
        if (!byAccount.has(key)) byAccount.set(key, { pre: 0, post: 0 });
        const amount = Number(item?.uiTokenAmount?.uiAmount || 0);
        byAccount.get(key)[item.phase] = amount;
      }
      let delta = 0;
      for (const pair of byAccount.values()) delta += (pair.post - pair.pre);
      return delta;
    }

    function findCounterparty(tx, direction) {
      const instructions = [
        ...(tx?.transaction?.message?.instructions || []),
        ...((tx?.meta?.innerInstructions || []).flatMap((group) => group.instructions || [])),
      ];
      for (const instruction of instructions) {
        const parsed = instruction?.parsed;
        const type = parsed?.type;
        const info = parsed?.info || {};
        if (!parsed || (type !== "transfer" && type !== "transferChecked")) continue;
        const source = info.source;
        const destination = info.destination;
        if (direction === "in" && destination === TROLL_WALLET) return source;
        if (direction === "out" && source === TROLL_WALLET) return destination;
      }
      return null;
    }

    async function getRecentTrollTransfers() {
      const signatures = [];
      let before = null;
      while (signatures.length < MAX_SIGNATURE_SCAN) {
        const batch = await rpcRequest("getSignaturesForAddress", [
          TROLL_WALLET,
          { limit: 50, ...(before ? { before } : {}) }
        ]);
        if (!batch.length) break;
        signatures.push(...batch);
        before = batch[batch.length - 1].signature;
        if (batch.length < 50) break;
      }
      const transferRows = [];
      for (const item of signatures) {
        if (!item?.signature) continue;
        const tx = await rpcRequest("getTransaction", [
          item.signature,
          { encoding: "jsonParsed", maxSupportedTransactionVersion: 0 }
        ]);
        if (!tx?.meta || tx.meta.err) continue;
        const delta = findTokenDelta(tx.meta, TROLL_WALLET);
        if (!delta) continue;
        const direction = delta > 0 ? "in" : "out";
        const absoluteAmount = Math.abs(delta);
        const counterparty = findCounterparty(tx, direction);
        const name = await resolveSolName(counterparty);
        transferRows.push({
          signature: item.signature,
          blockTime: item.blockTime || tx.blockTime || null,
          direction,
          amount: absoluteAmount,
          counterparty: counterparty || "Unknown",
          displayCounterparty: name || counterparty || "Unknown",
        });
        if (transferRows.length >= MAX_TRANSFER_ITEMS) break;
      }

      return transferRows.sort((a, b) => (b.blockTime || 0) - (a.blockTime || 0));
    }

    function renderTransfers(transfers) {
      const transferListEl = document.getElementById("transfer-list");
      const transferStatusEl = document.getElementById("transfer-status");
      if (!transfers.length) {
        transferStatusEl.textContent = "No recent $TROLL transfers found.";
        transferListEl.innerHTML = "<div class='transfer-item'>No $TROLL movements were detected in the recent transactions.</div>";
        return;
      }

      transferStatusEl.textContent = `Showing ${transfers.length} most recent transfers (newest first)`;
      transferListEl.innerHTML = transfers.map((tx) => {
        const date = tx.blockTime ? new Date(tx.blockTime * 1000).toLocaleString() : "Unknown date";
        const usdValue = latestTrollUsd ? tx.amount * latestTrollUsd : null;
        const directionClass = tx.direction === "in" ? "transfer-in" : "transfer-out";
        const directionLabel = tx.direction === "in" ? "Incoming to Fund Wallet" : "Outgoing from Fund Wallet";
        const actorLabel = tx.direction === "in" ? "From" : "To";
        return `
          <article class="transfer-item">
            <div class="transfer-direction ${directionClass}">${directionLabel}</div>
            <div class="transfer-title">${actorLabel}: <strong>${tx.displayCounterparty}</strong> <span class="transfers-note">(${shortenAddress(tx.counterparty)})</span></div>
            <div class="transfer-amount">${fmtTokenAmount(tx.amount)} TROLL ${usdValue === null ? "(USD pending)" : `(~$${fmtUsd(usdValue)} at current price)`}</div>
            <div class="transfer-meta">Date: ${date}<br>Signature: <a href="https://solscan.io/tx/${tx.signature}" target="_blank" rel="noopener noreferrer">${shortenAddress(tx.signature)}</a></div>
          </article>
        `;
      }).join("");
    }

    async function loadTransfers() {
      const transferStatusEl = document.getElementById("transfer-status");
      try {
        if (!cachedTransfers.length) {
          cachedTransfers = await getRecentTrollTransfers();
        }
        renderTransfers(cachedTransfers);
      } catch (err) {
        console.error("Unable to load transfer feed", err);
        transferStatusEl.textContent = "Transfer feed unavailable right now.";
        document.getElementById("transfer-list").innerHTML = "<div class='transfer-item'>Could not fetch recent transfers from Solana RPC.</div>";
      }
    }

    async function loadTrollStats() {
      const balanceEl = document.getElementById("troll-balance");
      const usdEl = document.getElementById("troll-usd");
      const marketLineEl = document.getElementById("market-line");

      const [priceResult, balanceResult] = await Promise.allSettled([
        getTrollPrice(),
        getTrollBalance(),
      ]);

      const hasPrice = priceResult.status === "fulfilled";
      const hasBalance = balanceResult.status === "fulfilled";

      if (hasBalance) {
        balanceEl.textContent = `${fmtTokenAmount(balanceResult.value.amount)} TROLL`;
      } else {
        balanceEl.textContent = "Unavailable";
      }

      if (hasPrice && hasBalance) {
        latestTrollUsd = priceResult.value.trollUsd;
        const usdValue = balanceResult.value.amount * priceResult.value.trollUsd;
        usdEl.textContent = `$${fmtUsd(usdValue)}`;
        marketLineEl.textContent = `${priceResult.value.source} live: $TROLL $${fmtPrice(priceResult.value.trollUsd)} | Wallet via ${new URL(balanceResult.value.endpoint).hostname}`;
        writeStatsCache({
          balance: balanceResult.value.amount,
          usdValue,
          price: priceResult.value.trollUsd,
        });
        return;
      }

      if (hasPrice) {
        latestTrollUsd = priceResult.value.trollUsd;
        usdEl.textContent = "Waiting on wallet...";
        marketLineEl.textContent = `${priceResult.value.source} live: $TROLL $${fmtPrice(priceResult.value.trollUsd)} | Wallet RPC unavailable`;
      } else if (hasBalance) {
        usdEl.textContent = "Waiting on price...";
        marketLineEl.textContent = `Wallet loaded (${new URL(balanceResult.value.endpoint).hostname}) | CoinGecko unavailable`;
      } else {
        usdEl.textContent = "Unavailable";
        marketLineEl.textContent = "Market and wallet data unavailable.";
      }

      if (priceResult.status === "rejected") console.error("Unable to load $TROLL price", priceResult.reason);
      if (balanceResult.status === "rejected") console.error("Unable to load $TROLL wallet balance", balanceResult.reason);
    }

    function setupWalletCopyButton() {
      const button = document.getElementById("copy-wallet-btn");
      if (!button) return;
      button.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(TROLL_WALLET);
          button.classList.add("copied");
          button.title = "Copied!";
          setTimeout(() => {
            button.classList.remove("copied");
            button.title = "Copy wallet address";
          }, 1100);
        } catch (err) {
          console.error("Clipboard copy failed", err);
        }
      });
    }

    setupWalletCopyButton();
    applyCachedStats();

    Promise.allSettled([loadTrollStats(), loadTransfers()]).then(() => {
      // If price resolved after transfers rendered, refresh USD estimations.
      if (latestTrollUsd) loadTransfers();
    });
  </script>
</body>
</html>
