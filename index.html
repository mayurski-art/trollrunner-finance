<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Runner Finance</title>

<style>
:root {
  --bg: #050806;
  --panel: #0b140d;
  --panel-soft: #101c13;
  --line: rgba(126, 255, 142, 0.3);
  --text: #d8ffe0;
  --muted: #86bf93;
  --accent: #7eff8e;
  --accent-soft: rgba(126, 255, 142, 0.15);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: monospace;
  color: var(--text);
  background:
    radial-gradient(circle at 20% 10%, rgba(126,255,142,0.12), transparent 40%),
    radial-gradient(circle at 80% 0%, rgba(94,176,255,0.08), transparent 35%),
    linear-gradient(180deg, #070b08, #030503);
}

.wrap {
  max-width: 1040px;
  margin: 0 auto;
  padding: 24px;
}

.top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border:1px solid var(--line);
  border-radius:10px;
  background:rgba(126,255,142,0.05);
}

.pill {
  padding:6px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  color:var(--text);
  text-decoration:none;
  font-size:12px;
}

.hero {
  margin-top:20px;
  padding:20px;
  border:1px solid var(--line);
  border-radius:10px;
  background:rgba(10,20,13,0.6);
}

.stats {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}

.stat {
  padding:12px;
  border:1px solid var(--line);
  border-radius:10px;
  background:var(--panel);
}

.value {
  font-size:22px;
  color:var(--accent);
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:15px;
}

.card {
  border:1px solid var(--line);
  border-radius:10px;
  padding:12px;
  background:var(--panel);
}

.tx-feed {
  margin-top:10px;
  display:grid;
  gap:8px;
}

.tx-item {
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px;
  background:rgba(126,255,142,0.08);
  font-size:12px;
}

.tx-title {
  font-size:11px;
  color:var(--accent);
  margin-bottom:4px;
  text-transform:uppercase;
}

.tx-toasts {
  position:fixed;
  top:10px;
  right:10px;
  display:grid;
  gap:8px;
  width:300px;
}

.tx-toast {
  padding:10px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#06110a;
  font-size:12px;
}

.wallet {
  font-size:12px;
  padding:10px;
  border:1px dashed var(--line);
  margin-top:8px;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="top">
    <strong>TROLLRUNNER.FINANCE</strong>
    <div style="display:flex; gap:8px;">
      <a class="pill" href="#">Blog</a>
      <a class="pill" href="#">Main</a>
    </div>
  </div>

  <div class="hero">
    <h2>Treasury Console</h2>
    <div id="market-line">Loading...</div>

    <div class="stats">
      <div class="stat">
        <div>$TROLL Balance</div>
        <div class="value" id="balance">...</div>
      </div>
      <div class="stat">
        <div>USD Value</div>
        <div class="value" id="usd">...</div>
      </div>
      <div class="stat">
        <div>Status</div>
        <div class="value">Live</div>
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <h3>Wallet</h3>
      <div class="wallet">79vVRZ7qnZfj9xCto5d9Kwf4eAimqMDrQysZjHBbFbsA</div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Budget Dashboard</h3>
        <div id="tx-feed" class="tx-feed"></div>
      </div>
      <div class="card"><h3>Campaign Costs</h3></div>
      <div class="card"><h3>Growth</h3></div>
    </div>

  </div>
</div>

<div id="tx-toasts" class="tx-toasts"></div>

<script>
const WALLET = "79vVRZ7qnZfj9xCto5d9Kwf4eAimqMDrQysZjHBbFbsA";
const MINT = "5UUH9RTDiSpq6HKS6bp4NdU9PNJpXRXuiw6ShBTBhgH2";

const RPCS = [
  "https://solana-rpc.publicnode.com",
  "https://api.mainnet-beta.solana.com"
];

let seen = new Set();
let loading = false;

function fmt(n){return Number(n||0).toLocaleString();}

async function rpc(url, method, params){
  const r = await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({jsonrpc:"2.0",id:1,method,params})
  });
  const j = await r.json();
  return j.result;
}

async function getPrice(){
  const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=troll-2&vs_currencies=usd");
  const j = await r.json();
  return j["troll-2"].usd;
}

function getDelta(tx){
  const meta = tx?.meta;
  if(!meta) return null;

  const pre = meta.preTokenBalances || [];
  const post = meta.postTokenBalances || [];

  function bal(arr){
    return arr.filter(x=>x.mint===MINT && x.owner===WALLET)
      .reduce((a,b)=>a+(b.uiTokenAmount?.uiAmount||0),0);
  }

  const d = bal(post)-bal(pre);
  if(d===0) return null;

  return {
    delta:d,
    sig:tx.transaction.signatures[0],
    time:tx.blockTime
  };
}

async function getTxs(){
  for(const r of RPCS){
    try{
      const sigs = await rpc(r,"getSignaturesForAddress",[WALLET,{limit:20}]);
      const out=[];

      for(const s of sigs){
        const tx = await rpc(r,"getTransaction",[s.signature,{encoding:"jsonParsed"}]);
        const ev = getDelta(tx);
        if(ev) out.push(ev);
      }
      return out;
    }catch(e){}
  }
  return [];
}

function add(tx,price){
  const feed=document.getElementById("tx-feed");

  const el=document.createElement("div");
  el.className="tx-item";

  const usd=Math.abs(tx.delta)*price;

  el.innerHTML=`
    <div class="tx-title">${tx.delta>0?"IN":"OUT"} · ${new Date(tx.time*1000).toLocaleString()}</div>
    <div>${tx.delta>0?"+":""}${fmt(tx.delta)} TROLL</div>
    <div>$${usd.toFixed(2)}</div>
  `;

  feed.prepend(el);

  if(!seen.has(tx.sig)){
    seen.add(tx.sig);
    toast(tx,usd,price);
  }
}

function toast(tx,usd,price){
  const wrap=document.getElementById("tx-toasts");
  const el=document.createElement("div");
  el.className="tx-toast";
  el.textContent=`${tx.delta>0?"IN":"OUT"} ${fmt(tx.delta)} ($${usd.toFixed(2)})`;
  wrap.prepend(el);
  setTimeout(()=>el.remove(),6000);
}

async function load(){
  if(loading) return;
  loading=true;

  try{
    const price=await getPrice();
    const txs=await getTxs();

    document.getElementById("market-line").textContent="Live price loaded";
    document.getElementById("balance").textContent="Loaded";

    let total=0;
    txs.forEach(t=>{
      total+=t.delta;
      add(t,price);
    });

    document.getElementById("usd").textContent="$"+(total*price).toFixed(2);

  }catch(e){
    console.log(e);
  }

  loading=false;
}

load();
setInterval(load,30000);
</script>

</body>
</html>
