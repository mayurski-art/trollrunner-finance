<script>
  const TROLL_WALLET = "79vVRZ7qnZfj9xCto5d9Kwf4eAimqMDrQysZjHBbFbsA";
  const TROLL_MINT = "PASTE_YOUR_TOKEN_MINT_HERE"; // 👈 IMPORTANT

  function fmtNumber(value) {
    return Number(value || 0).toLocaleString(undefined, {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });
  }

  async function getPrices() {
    const res = await fetch(
      `https://api.dexscreener.com/latest/dex/tokens/${TROLL_MINT}`
    );

    if (!res.ok) throw new Error(`Dexscreener API returned ${res.status}`);

    const json = await res.json();
    const pair = json?.pairs?.[0];

    if (!pair) throw new Error("No trading pair found");

    const trollUsd = Number(pair.priceUsd || 0);

    return { trollUsd };
  }

  async function getTrollBalance() {
    const res = await fetch(
      `https://public-api.solscan.io/account/tokens?account=${TROLL_WALLET}`
    );

    if (!res.ok) throw new Error(`Token API returned ${res.status}`);

    const tokens = await res.json();

    const trollToken = (tokens || []).find((token) => {
      const symbol = (token?.tokenSymbol || token?.symbol || "").toUpperCase();
      return symbol.includes("TROLL"); // safer match
    });

    if (!trollToken) throw new Error("$TROLL token not found");

    return Number(
      trollToken?.tokenAmount?.uiAmount ??
      trollToken?.amount ??
      trollToken?.balance ??
      0
    );
  }

  async function loadTrollStats() {
    const balanceEl = document.getElementById("troll-balance");
    const usdEl = document.getElementById("troll-usd");
    const marketLineEl = document.getElementById("market-line");

    try {
      const [{ trollUsd }, amount] = await Promise.all([
        getPrices(),
        getTrollBalance(),
      ]);

      const usdValue = amount * trollUsd;

      balanceEl.textContent = `${fmtNumber(amount)} TROLL`;
      usdEl.textContent = `$${fmtNumber(usdValue)}`;

      marketLineEl.textContent = `Live market: $TROLL $${fmtNumber(trollUsd)} (Dexscreener)`;
    } catch (err) {
      console.error("Error loading data:", err);

      balanceEl.textContent = "Unavailable";
      usdEl.textContent = "Unavailable";
      if (marketLineEl) marketLineEl.textContent = "Market data unavailable.";
    }
  }

  // initial load
  loadTrollStats();

  // 🔁 refresh every 10 seconds (real-time feel)
  setInterval(loadTrollStats, 10000);
</script>
